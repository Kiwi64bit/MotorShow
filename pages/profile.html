<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Profile</title>
        <link rel="stylesheet" href="../styles/global.css" />
        <link rel="stylesheet" href="../styles/profile.css" />
    </head>
    <body>
        <header>
            <nav class="navbar">
                <div class="container">
                    <a href="index.html" class="navbar-brand">MotorShow</a>

                    <div class="navbar-nav">
                        <ul class="nav">
                            <a href="../index.html" class="nav-link">Home</a>
                            <a href="./listings.html" class="nav-link">Listings</a>
                            <a href="./blog.html" class="nav-link">Blog</a>
                            <a href="./about.html" class="nav-link">About</a>
                            <a href="./contact.html" class="nav-link">Contact</a>
                        </ul>
                    </div>

                    <button id="themeToggle" class="theme-toggler"></button>

                    <div class="nav-auth" id="navAuth">
                        <a class="button primary" href="./login.html" id="loginLink">Login</a>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <section class="container-sm profile">
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="avatar" id="avatar"></div>

                        <div>
                            <h2 id="displayName"></h2>
                            <p class="muted" id="displayEmail"></p>
                        </div>
                    </div>

                    <hr class="divider" />

                    <!-- VIEW MODE -->
                    <div id="viewMode">
                        <div class="info-grid">
                            <div>
                                <span class="label">Phone</span>
                                <p id="viewPhone"></p>
                            </div>
                        </div>

                        <button class="button primary" id="editBtn">Edit Profile</button>
                        <button class="button danger" id="logoutBtn">Sign Out</button>
                    </div>

                    <!-- EDIT MODE -->
                    <form id="editMode" class="hidden">
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input class="form-control" id="nameInput" />
                            <div class="form-feedback"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input class="form-control" id="phoneInput" />
                            <div class="form-feedback"></div>
                        </div>

                        <button class="button success" type="submit">Save Changes</button>
                        <button class="button danger" type="button" id="cancelBtn">Cancel</button>
                    </form>
                </div>
            </section>
        </main>

        <script src="../scripts/validation.js"></script>
        <script src="../scripts/profile.js"></script>
        <script src="../scripts/navAuth.js"></script>
        <script src="../scripts/toggleTheme.js"></script>
    </body>
</html>
