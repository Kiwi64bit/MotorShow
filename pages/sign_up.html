<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="../styles/login_signup.css">
</head>
<body>
    <div class="form-wrapper">
        <form action="#" class="form-container">
            <h1>Sign Up</h1>
            <p>Step into the world of cars, the easy way in Motor Show.</p>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" name="phone" id="phone" pattern="[0-9]{11}" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                title="Must contain at least 8 characters, including one uppercase letter, one lowercase letter, and one number" required>
            </div>

            <button type="submit" class="submit-button">Sign Up</button>

            <p  >Already have account? <a  class="signin-link" href="login.html">Log In</a> </p>
        </form>
    </div>
</body>
</html>
