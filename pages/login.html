<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="../styles/login_signup.css">
    
</head>
<body>
    <div class="form-wrapper">    <!--from class="signin-wrapper"  to class="form-wrapper" -->
        <form action="#" class="form-container" > <!--//form class="signin-form" to class="form-contaiber" -->  
            <h1>Log in</h1>
            <p>Welcome back to MotorShow.</p>

            <div class="form-group">
                <label for="email">Email</label>
                <br>
                <input type="email" id="email" name="email"  required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <br>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forget Password?</a>
            </div>

            <button type="submit" class="submit-button">Sign in</button>   <!-- //from class="signin-button" to class="submit-button"--> 

            <p  >Don't have an account? <a  class="signup-link" href="sign-up.html">Sign Up</a> </p>
        </form>
    </div>
    
</body>
</html>
