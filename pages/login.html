<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login</title>
        <link rel="stylesheet" href="../styles/global.css" />
        <link rel="stylesheet" href="../styles/login_signup.css" />
    </head>
    <body>
        <header>
            <nav class="navbar">
                <div class="container">
                    <a href="index.html" class="navbar-brand">MotorShow</a>

                    <div class="navbar-nav">
                        <ul class="nav">
                            <a href="../index.html" class="nav-link">Home</a>
                            <a href="./listings.html" class="nav-link">Listings</a>
                            <a href="./blog.html" class="nav-link">Blog</a>
                            <a href="./about.html" class="nav-link">About</a>
                            <a href="./contact.html" class="nav-link">Contact</a>
                        </ul>
                    </div>

                    <button id="themeToggle" class="theme-toggler"></button>

                    <div class="nav-auth" id="navAuth">
                        <a class="button primary" href="./login.html" id="loginLink">Login</a>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <div class="container-sm">
                <div class="form-container">
                    <form action="" class="form" id="loginForm">
                        <!--//form class="signin-form" to class="form-contaiber" -->
                        <div class="form-header">
                            <h1>Log in</h1>
                            <p>Welcome back to MotorShow.</p>
                        </div>

                        <div class="form-body">
                            <div class="form-group">
                                <label class="form-label" for="email">Email</label>
                                <input
                                    type="text"
                                    name="email"
                                    id="email"
                                    class="form-control"
                                    placeholder="e.g. example@gmail.com" />
                                <span class="form-feedback"></span>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="password">Password</label>
                                <input type="text" name="password" id="password" class="form-control" />
                                <span class="form-feedback"></span>
                            </div>

                            <button type="submit" class="button primary">Sign in</button>
                        </div>

                        <div class="form-footer">
                            <p>Don't have an account? <a class="link" href="./sign_up.html">Sign Up</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <script src="../scripts/validation.js"></script>
        <script src="../scripts/login.js"></script>
        <script src="../scripts/navAuth.js"></script>
        <script src="../scripts/toggleTheme.js"></script>
    </body>
</html>
